<ion-content class="ion-padding ion-text-center login-bg">
  <div class="login-container">
    
    <div class="logo-container">
      <h2>Crie seu Passaporte</h2>
      <p>O mundo te espera.</p>
    </div>

    <div class="avatar-picker" (click)="takePicture()">
      <div class="avatar-circle">
        <img *ngIf="selectedImageUri" [src]="selectedImageUri" />
        <ion-icon *ngIf="!selectedImageUri" name="camera-outline"></ion-icon>
      </div>
      <p>Adicionar Foto</p>
    </div>

    <form #registerForm="ngForm" (ngSubmit)="registerForm.form.valid && register()" class="login-form">
      <ion-item lines="none" class="input-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input type="text" placeholder="Nome Completo" [(ngModel)]="name" name="name" required></ion-input>
      </ion-item>
      
      <ion-item lines="none" class="input-item">
        <ion-icon name="at-outline" slot="start"></ion-icon>
        <ion-input type="text" placeholder="Username único" [(ngModel)]="username" name="username" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-icon name="globe-outline" slot="start"></ion-icon>
        <ion-select label="País de Origem" label-placement="floating" [(ngModel)]="nationality" name="nationality" required>
          <ion-select-option *ngFor="let country of countries" [value]="country.code">
            {{ country.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="E-mail" [(ngModel)]="email" name="email" required email></ion-input>
      </ion-item>
      
      <ion-item lines="none" class="input-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Senha" [(ngModel)]="password" name="password" required minlength="6"></ion-input>
        <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword" color="medium">
          <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-button expand="block" shape="round" type="submit" class="login-btn" [disabled]="!registerForm.form.valid || isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Criar Conta</span>
      </ion-button>
    </form>

    <div class="register-link-container">
      <ion-button fill="clear" color="medium" class="register-link" routerLink="/login">
        Já possui uma conta? <strong>Entrar</strong>
      </ion-button>
    </div>
  </div>
</ion-content>
